name: Deploy to GitHub Pages

on:
  push:
    branches: [ "main" ]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Publish project
        run: dotnet publish WebProgLab.csproj -c Release -o output

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: LegacyHTML

  deploy:
    runs-on: ubuntu-latest
    needs: build

    environment:
      name: github-pages

    steps:
      - name: Deploy
        uses: actions/deploy-pages@v4